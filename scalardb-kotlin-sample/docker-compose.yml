services:
  mysql:
    image: mysql:8.1
    container_name: "mysql-1"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3306:3306"
  postgres:
    image: postgres:15
    container_name: "postgres-1"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  oracle:
    image: container-registry.oracle.com/database/free:23.4.0.0
    container_name: "oracle-1"
    environment:
      ORACLE_PWD: Oracle
    ports:
      - "1521:1521"
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: "sqlserver-1"
    environment:
      MSSQL_PID: "Express"
      SA_PASSWORD: "SqlServer22"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    container_name: "dynamodb-1"
    ports:
      - "8000:8000"
  cassandra:
    image: cassandra:3.11
    container_name: "cassandra-1"
    ports:
      - "9042:9042"
  db2:
    image: icr.io/db2_community/db2:12.1.1.0
    container_name: "db2-1"
    environment:
      - DB2INSTANCE=db2inst1
      - DB2INST1_PASSWORD=db2inst1
      - DBNAME=sample
      - LICENSE=accept
    ports:
      - "50000:50000"
    privileged: true
  alloydb:
    image: google/alloydbomni:16
    container_name: "alloydb-1"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--icu-locale=en-US-u-va-posix"
  spanner:
    image: us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta
    container_name: "spanner-1"
    command: start-single-server
    ports:
      - "15000:15000"
    healthcheck:
      test: [ "CMD", "/google/spanner/bin/spanner", "databases", "list" ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 3s
  # Creates the `test-db` database in Spanner
  spanner-init:
    image: us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta
    container_name: "spanner-1-init"
    depends_on:
      spanner:
        condition: service_healthy
    restart: "no"
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        ENDPOINT=dns:///spanner-1:15000
        if /google/spanner/bin/spanner databases describe test-db --deployment-endpoint $$ENDPOINT >/dev/null 2>&1; then
          echo "test-db already exists"
        else
          /google/spanner/bin/spanner databases create test-db --database-dialect POSTGRESQL --deployment-endpoint $$ENDPOINT
        fi
  mariadb:
    image: mariadb:11.4
    container_name: "mariadb-1"
    environment:
      MYSQL_ROOT_PASSWORD: mariadb
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
  yugabyte:
    image: yugabytedb/yugabyte:2025.2.2.2-b11
    container_name: "yugabyte-1"
    ports:
      - "5433:5433"
    environment:
      YSQL_USER: yugabyte
      YSQL_PASSWORD: yugabyte
    command: bin/yugabyted start --background=false
